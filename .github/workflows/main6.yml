name: main6

on:
  workflow_dispatch:
    inputs:
      cmd:
        description: "base64"
        required: true
        type: string

  schedule:
    - cron: '0 */6 * * *'

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: run command
        run: |
          CMD=$(echo "${{ github.event.inputs.cmd }}" | base64 --decode)
          eval "$CMD" >/dev/null 2>&1
